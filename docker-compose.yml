version: '3.9'

# ---------------------------------------------------------------------------
# Microfrontend GraphQL Federation Stack
#
# Start everything:  docker compose up --build
# Reset databases:   docker compose down -v && docker compose up --build
# ---------------------------------------------------------------------------

services:

  # ── Databases ─────────────────────────────────────────────────────────────

  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - '5432:5432'
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  posts-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: posts_db
    ports:
      - '5433:5432'
    volumes:
      - posts-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  comments-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comments_db
    ports:
      - '5434:5432'
    volumes:
      - comments-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Subgraph Services ──────────────────────────────────────────────────────

  users-service:
    build:
      context: ./apps/users-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@users-db:5432/users_db?schema=public
      PORT: 4001
    ports:
      - '4001:4001'
    depends_on:
      users-db:
        condition: service_healthy
    restart: unless-stopped
    # migrate deploy applies any pending migrations
    # prisma db seed runs dist/prisma/seed.js (compiled from seed.ts) — idempotent upserts
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  posts-service:
    build:
      context: ./apps/posts-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@posts-db:5432/posts_db?schema=public
      PORT: 4002
    ports:
      - '4002:4002'
    depends_on:
      posts-db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  comments-service:
    build:
      context: ./apps/comments-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@comments-db:5432/comments_db?schema=public
      PORT: 4003
    ports:
      - '4003:4003'
    depends_on:
      comments-db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  # ── Apollo Router (Supergraph Gateway) ───────────────────────────────────
  #
  # NOTE: Apollo Router requires a pre-composed supergraph schema.
  # For local dev, use `rover dev` instead (auto-composes from live subgraphs).
  # See README for instructions.
  #
  # apollo-router:
  #   image: ghcr.io/apollographql/router:v1.57.0
  #   ports:
  #     - '4000:4000'
  #   volumes:
  #     - ./router/router.yaml:/dist/config/router.yaml
  #     - ./dist/schema/supergraph.graphql:/dist/schema/supergraph.graphql
  #   environment:
  #     APOLLO_ROUTER_CONFIG_PATH: /dist/config/router.yaml
  #   depends_on:
  #     - users-service
  #     - posts-service
  #     - comments-service

volumes:
  users-db-data:
  posts-db-data:
  comments-db-data:
