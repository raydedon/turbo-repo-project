version: '3.9'

# ---------------------------------------------------------------------------
# Microfrontend GraphQL Federation Stack
#
# Start everything:  docker compose up --build
# Reset databases:   docker compose down -v && docker compose up --build
# ---------------------------------------------------------------------------

services:

  # ── Database (single instance, three databases) ───────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Subgraph Services ──────────────────────────────────────────────────────

  users-service:
    build:
      context: ./apps/users-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/users_db?schema=public
      PORT: 4001
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  posts-service:
    build:
      context: ./apps/posts-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/posts_db?schema=public
      PORT: 4002
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  comments-service:
    build:
      context: ./apps/comments-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/comments_db?schema=public
      PORT: 4003
    ports:
      - '4003:4003'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  # ── Apollo Router (Supergraph Gateway) ───────────────────────────────────
  #
  # NOTE: Apollo Router requires a pre-composed supergraph schema.
  # For local dev, use `rover dev` instead (auto-composes from live subgraphs).
  # See README for instructions.
  #
  # apollo-router:
  #   image: ghcr.io/apollographql/router:v1.57.0
  #   ports:
  #     - '4000:4000'
  #   volumes:
  #     - ./router/router.yaml:/dist/config/router.yaml
  #     - ./dist/schema/supergraph.graphql:/dist/schema/supergraph.graphql
  #   environment:
  #     APOLLO_ROUTER_CONFIG_PATH: /dist/config/router.yaml
  #   depends_on:
  #     - users-service
  #     - posts-service
  #     - comments-service

volumes:
  postgres-data:
