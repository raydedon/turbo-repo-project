# Apollo Router configuration
# Docs: https://www.apollographql.com/docs/router/configuration/overview

supergraph:
  # Path to the composed supergraph schema (generated by rover)
  path: /dist/schema/supergraph.graphql

server:
  experimental_http2: http1_only

cors:
  origins:
    - http://localhost:3000  # blogs app
    - http://localhost:3002  # users app

# Response caching — caches query results at the Router level
# Individual fields opt in via @cacheControl directives in subgraphs
preview_entity_cache:
  enabled: false  # enable when Redis is available

# Persisted queries reduce request sizes (Automatic Persisted Queries)
apq:
  router:
    cache:
      in_memory:
        limit: 512

# Subscription support — Router forwards WebSocket connections to subgraphs
subscription:
  enabled: true
  mode:
    preview_callback:
      public_url: http://localhost:4000

# Query planning telemetry (helpful during development)
telemetry:
  instrumentation:
    spans:
      mode: spec_compliant
