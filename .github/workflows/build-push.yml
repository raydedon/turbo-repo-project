name: Build & Push Images

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated: users-service,posts-service,comments-service,apollo-router or "all")'
        required: true
        default: 'all'

env:
  AWS_REGION: ap-south-1
  PROJECT: turbo-graphql
  ACCOUNT: 913524945602

jobs:
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, posts-service, comments-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT }}/${{ matrix.service }}:latest
            ${{ env.ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT }}/${{ matrix.service }}:${{ github.sha }}

  build-router:
    name: Build Apollo Router
    runs-on: ubuntu-latest
    needs: build-services

    steps:
      - uses: actions/checkout@v4

      - name: Install Rover CLI
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compose supergraph schema
        run: |
          if [ -n "${{ secrets.SUPERGRAPH_SDL }}" ]; then
            echo "${{ secrets.SUPERGRAPH_SDL }}" > supergraph.graphql
          else
            rover supergraph compose --config supergraph.prod.yaml --output supergraph.graphql
          fi

      - name: Build and push Apollo Router
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./router/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT }}/apollo-router:latest
            ${{ env.ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT }}/apollo-router:${{ github.sha }}

  redeploy:
    name: Force redeploy ECS services
    runs-on: ubuntu-latest
    needs: [build-services, build-router]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployments
        run: |
          for SERVICE in users-service posts-service comments-service apollo-router; do
            aws ecs update-service \
              --cluster ${{ env.PROJECT }}-production \
              --service ${{ env.PROJECT }}-production-${SERVICE} \
              --force-new-deployment \
              --output text --query 'service.serviceName'
          done
