name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  PROJECT: turbo-graphql
  CLUSTER: turbo-graphql-production

jobs:
  # ── Build & push subgraph service images ────────────────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, posts-service, comments-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}/${{ matrix.service }}:latest

  # ── Compose supergraph schema & build Router image ───────────────────────────
  build-router:
    name: Build Apollo Router
    runs-on: ubuntu-latest
    needs: build-services

    steps:
      - uses: actions/checkout@v4

      - name: Install Rover CLI
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compose supergraph schema
        # Requires subgraph services to be running and reachable.
        # On first deploy, run this manually from inside the VPC.
        # On subsequent deploys, rover introspects the live subgraphs via their
        # Cloud Map DNS names (only reachable from within the VPC).
        # For CI, store a pre-composed supergraph.graphql as a GitHub Actions secret
        # or artefact and skip this step until services are live.
        run: |
          if [ -n "${{ secrets.SUPERGRAPH_SDL }}" ]; then
            echo "${{ secrets.SUPERGRAPH_SDL }}" > supergraph.graphql
          else
            rover supergraph compose \
              --config supergraph.prod.yaml \
              --output supergraph.graphql
          fi

      - name: Build and push Router image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./router/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}/apollo-router:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}/apollo-router:latest

  # ── Run Prisma migrations then deploy ECS services ───────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-services, build-router]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Prisma migrations
        run: |
          for SERVICE in users-service posts-service comments-service; do
            echo "Running migrations for $SERVICE..."
            TASK_ARN=$(aws ecs run-task \
              --cluster ${{ env.CLUSTER }} \
              --task-definition ${{ env.PROJECT }}-production-${SERVICE}-migrate \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SG_ID }}],assignPublicIp=ENABLED}" \
              --query 'tasks[0].taskArn' \
              --output text)

            echo "Waiting for migration task $TASK_ARN to complete..."
            aws ecs wait tasks-stopped \
              --cluster ${{ env.CLUSTER }} \
              --tasks "$TASK_ARN"

            EXIT_CODE=$(aws ecs describe-tasks \
              --cluster ${{ env.CLUSTER }} \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].containers[0].exitCode' \
              --output text)

            if [ "$EXIT_CODE" != "0" ]; then
              echo "Migration failed for $SERVICE (exit code $EXIT_CODE)"
              exit 1
            fi
            echo "Migration succeeded for $SERVICE"
          done

      - name: Deploy subgraph services
        run: |
          for SERVICE in users-service posts-service comments-service; do
            aws ecs update-service \
              --cluster ${{ env.CLUSTER }} \
              --service ${{ env.PROJECT }}-production-${SERVICE} \
              --force-new-deployment \
              --output text --query 'service.serviceName'
          done

      - name: Deploy Apollo Router
        run: |
          aws ecs update-service \
            --cluster ${{ env.CLUSTER }} \
            --service ${{ env.PROJECT }}-production-apollo-router \
            --force-new-deployment \
            --output text --query 'service.serviceName'
