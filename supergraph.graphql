schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/join/v0.3", for: EXECUTION)
{
  query: Query
  mutation: Mutation
}

directive @join__enumValue(graph: join__Graph!) repeatable on ENUM_VALUE

directive @join__field(graph: join__Graph, requires: join__FieldSet, provides: join__FieldSet, type: String, external: Boolean, override: String, usedOverridden: Boolean) repeatable on FIELD_DEFINITION | INPUT_FIELD_DEFINITION

directive @join__graph(name: String!, url: String!) on ENUM_VALUE

directive @join__implements(graph: join__Graph!, interface: String!) repeatable on OBJECT | INTERFACE

directive @join__type(graph: join__Graph!, key: join__FieldSet, extension: Boolean! = false, resolvable: Boolean! = true, isInterfaceObject: Boolean! = false) repeatable on OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR

directive @join__unionMember(graph: join__Graph!, member: String!) repeatable on UNION

directive @link(url: String, as: String, for: link__Purpose, import: [link__Import]) repeatable on SCHEMA

type Address
  @join__type(graph: USERS)
{
  street: String!
  suite: String!
  city: String!
  zipcode: String!
  geo: Geo!
}

type Comment
  @join__type(graph: COMMENTS, key: "id")
{
  id: ID!
  postId: ID!
  userId: ID!
  user: User!
  body: String!
  post: Post!
}

type Company
  @join__type(graph: USERS)
{
  name: String!
  catchPhrase: String!
  bs: String!
}

type Geo
  @join__type(graph: USERS)
{
  lat: String!
  lng: String!
}

scalar join__FieldSet

enum join__Graph {
  COMMENTS @join__graph(name: "comments", url: "http://comments-service.turbo-graphql.local:4003/graphql")
  POSTS @join__graph(name: "posts", url: "http://posts-service.turbo-graphql.local:4002/graphql")
  USERS @join__graph(name: "users", url: "http://users-service.turbo-graphql.local:4001/graphql")
}

scalar link__Import

enum link__Purpose {
  """
  `SECURITY` features provide metadata necessary to securely resolve fields.
  """
  SECURITY

  """
  `EXECUTION` features provide metadata necessary for operation execution.
  """
  EXECUTION
}

type Mutation
  @join__type(graph: COMMENTS)
  @join__type(graph: POSTS)
{
  """Add a comment to a post"""
  addComment(postId: ID!, body: String!, userId: ID!): Comment! @join__field(graph: COMMENTS)

  """Create a new post (triggers postPublished subscription)"""
  createPost(userId: ID!, title: String!, body: String!): Post! @join__field(graph: POSTS)
}

type Post
  @join__type(graph: COMMENTS, key: "id", resolvable: false)
  @join__type(graph: POSTS, key: "id")
{
  id: ID!
  userId: Int! @join__field(graph: POSTS)
  title: String! @join__field(graph: POSTS)
  body: String! @join__field(graph: POSTS)
  publishedAt: String! @join__field(graph: POSTS)
  author: User! @join__field(graph: POSTS)
}

type PostsPage
  @join__type(graph: POSTS)
{
  posts: [Post!]!
  total: Int!
  page: Int!
  perPage: Int!
}

type Query
  @join__type(graph: COMMENTS)
  @join__type(graph: POSTS)
  @join__type(graph: USERS)
{
  """Fetch all comments for a post"""
  comments(postId: ID!): [Comment!]! @join__field(graph: COMMENTS)

  """Paginated posts in chronological order"""
  posts(page: Int! = 1, perPage: Int! = 10): PostsPage! @join__field(graph: POSTS)

  """Fetch a post by ID"""
  post(id: ID!): Post @join__field(graph: POSTS)

  """Fetch all posts by a user"""
  postsByUser(userId: ID!): [Post!]! @join__field(graph: POSTS)

  """Fetch all users"""
  users: [User!]! @join__field(graph: USERS)

  """Fetch a user by ID"""
  user(id: ID!): User @join__field(graph: USERS)
}

type User
  @join__type(graph: COMMENTS, key: "id", resolvable: false)
  @join__type(graph: POSTS, key: "id", resolvable: false)
  @join__type(graph: USERS, key: "id")
{
  id: ID!
  name: String! @join__field(graph: USERS)
  username: String! @join__field(graph: USERS)
  email: String! @join__field(graph: USERS)
  phone: String! @join__field(graph: USERS)
  website: String! @join__field(graph: USERS)
  address: Address @join__field(graph: USERS)
  company: Company @join__field(graph: USERS)
}